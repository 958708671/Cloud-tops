<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Top face - grass green -->
  <polygon points="16,2 30,10 16,18 2,10" fill="#80B348" stroke="#5B8731" stroke-width="0.5"/>
  <!-- Top face grid lines for pixel feel -->
  <line x1="16" y1="2" x2="16" y2="18" stroke="#5B8731" stroke-width="0.3" opacity="0.5"/>
  <line x1="2" y1="10" x2="30" y2="10" stroke="#5B8731" stroke-width="0.3" opacity="0.5"/>
  
  <!-- Left face - brown -->
  <polygon points="2,10 16,18 16,28 2,20" fill="#8B6914" stroke="#6B4C2A" stroke-width="0.5"/>
  <!-- Left face texture -->
  <line x1="9" y1="14" x2="9" y2="24" stroke="#6B4C2A" stroke-width="0.3" opacity="0.4"/>
  <line x1="2" y1="15" x2="16" y2="23" stroke="#6B4C2A" stroke-width="0.3" opacity="0.3"/>
  
  <!-- Right face - dark brown -->
  <polygon points="16,18 30,10 30,20 16,28" fill="#6B4C2A" stroke="#4A3520" stroke-width="0.5"/>
  <!-- Right face texture -->
  <line x1="23" y1="14" x2="23" y2="24" stroke="#4A3520" stroke-width="0.3" opacity="0.4"/>
  
  <!-- Grass tufts on top -->
  <rect x="6" y="6" width="4" height="2" fill="#5B8731" rx="0.5"/>
  <rect x="20" y="6" width="4" height="2" fill="#5B8731" rx="0.5"/>
  <rect x="5" y="4" width="3" height="3" fill="#5B8731" rx="0.5"/>
  <rect x="24" y="3" width="3" height="3" fill="#5B8731" rx="0.5"/>
  
  <!-- Top center highlight -->
  <polygon points="13,7 19,7 16,4" fill="#a3d96b" opacity="0.6"/>
</svg>